# Single-GPU small-scale training config: real training dynamics (paper group
# size, lr schedule, hard cases) at ~1/100 of the paper's compute. Good for a
# few-hour run on one shared GPU; use conf/grpo.yaml for paper-scale runs.

fp16_llm: true

sampling:
  n_timesteps: 10
  noise_level: 0.5
  window_size: 2
  window_start_min: 1
  window_start_max: 3
  logprob_reduction: mean

grpo:
  group_size: 8           # [paper]
  prompts_per_iter: 4     # paper: 8 per GPU x 8 GPUs; 32 samples/update here vs 512
  updates_per_iter: 2     # paper: 8; keep updates near on-policy at this scale
  clip_eps: 0.2
  kl_beta: 0.001
  lr: 1.0e-4              # [paper] linear decay to 0 at total_steps
  total_steps: 100        # 50 iterations x 2 updates; paper: 10000
  grad_clip: 1.0
  std_eps: 1.0e-6

lora:
  rank: 32
  alpha: 64
  dropout: 0.0

rewards:
  device: same
  weights:
    ss: 1.0
    asr: 1.0
    mos: 0.4
  speaker_model: iic/speech_eres2net_sv_zh-cn_16k-common
  zh_asr_model: paraformer-zh
  en_asr_model: openai/whisper-large-v3
  dnsmos_onnx: models/sig_bak_ovr.onnx

logging:
  save_every: 5
